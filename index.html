<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Chess Game</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="app">

    <!-- Header -->
    <div class="topbar">
      <h1>♟ Chess Arena</h1>

      <div id="turn" class="turn-box">
        White's Turn
      </div>
    </div>

    <!-- Chess Board -->
    <div id="game">

      <!-- Row 8 -->
      <div class="label">8</div>
      <div class="gamecell white-square" id="1_8"></div>
      <div class="gamecell black-square" id="2_8"></div>
      <div class="gamecell white-square" id="3_8"></div>
      <div class="gamecell black-square" id="4_8"></div>
      <div class="gamecell white-square" id="5_8"></div>
      <div class="gamecell black-square" id="6_8"></div>
      <div class="gamecell white-square" id="7_8"></div>
      <div class="gamecell black-square" id="8_8"></div>

      <!-- Row 7 -->
      <div class="label">7</div>
      <div class="gamecell black-square" id="1_7"></div>
      <div class="gamecell white-square" id="2_7"></div>
      <div class="gamecell black-square" id="3_7"></div>
      <div class="gamecell white-square" id="4_7"></div>
      <div class="gamecell black-square" id="5_7"></div>
      <div class="gamecell white-square" id="6_7"></div>
      <div class="gamecell black-square" id="7_7"></div>
      <div class="gamecell white-square" id="8_7"></div>

      <!-- Row 6 -->
      <div class="label">6</div>
      <div class="gamecell white-square" id="1_6"></div>
      <div class="gamecell black-square" id="2_6"></div>
      <div class="gamecell white-square" id="3_6"></div>
      <div class="gamecell black-square" id="4_6"></div>
      <div class="gamecell white-square" id="5_6"></div>
      <div class="gamecell black-square" id="6_6"></div>
      <div class="gamecell white-square" id="7_6"></div>
      <div class="gamecell black-square" id="8_6"></div>

      <!-- Row 5 -->
      <div class="label">5</div>
      <div class="gamecell black-square" id="1_5"></div>
      <div class="gamecell white-square" id="2_5"></div>
      <div class="gamecell black-square" id="3_5"></div>
      <div class="gamecell white-square" id="4_5"></div>
      <div class="gamecell black-square" id="5_5"></div>
      <div class="gamecell white-square" id="6_5"></div>
      <div class="gamecell black-square" id="7_5"></div>
      <div class="gamecell white-square" id="8_5"></div>

      <!-- Row 4 -->
      <div class="label">4</div>
      <div class="gamecell white-square" id="1_4"></div>
      <div class="gamecell black-square" id="2_4"></div>
      <div class="gamecell white-square" id="3_4"></div>
      <div class="gamecell black-square" id="4_4"></div>
      <div class="gamecell white-square" id="5_4"></div>
      <div class="gamecell black-square" id="6_4"></div>
      <div class="gamecell white-square" id="7_4"></div>
      <div class="gamecell black-square" id="8_4"></div>

      <!-- Row 3 -->
      <div class="label">3</div>
      <div class="gamecell black-square" id="1_3"></div>
      <div class="gamecell white-square" id="2_3"></div>
      <div class="gamecell black-square" id="3_3"></div>
      <div class="gamecell white-square" id="4_3"></div>
      <div class="gamecell black-square" id="5_3"></div>
      <div class="gamecell white-square" id="6_3"></div>
      <div class="gamecell black-square" id="7_3"></div>
      <div class="gamecell white-square" id="8_3"></div>

      <!-- Row 2 -->
      <div class="label">2</div>
      <div class="gamecell white-square" id="1_2"></div>
      <div class="gamecell black-square" id="2_2"></div>
      <div class="gamecell white-square" id="3_2"></div>
      <div class="gamecell black-square" id="4_2"></div>
      <div class="gamecell white-square" id="5_2"></div>
      <div class="gamecell black-square" id="6_2"></div>
      <div class="gamecell white-square" id="7_2"></div>
      <div class="gamecell black-square" id="8_2"></div>

      <!-- Row 1 -->
      <div class="label">1</div>
      <div class="gamecell black-square" id="1_1"></div>
      <div class="gamecell white-square" id="2_1"></div>
      <div class="gamecell black-square" id="3_1"></div>
      <div class="gamecell white-square" id="4_1"></div>
      <div class="gamecell black-square" id="5_1"></div>
      <div class="gamecell white-square" id="6_1"></div>
      <div class="gamecell black-square" id="7_1"></div>
      <div class="gamecell white-square" id="8_1"></div>

      <!-- Bottom Labels -->
      <div class="label empty"></div>
      <div class="label">a</div>
      <div class="label">b</div>
      <div class="label">c</div>
      <div class="label">d</div>
      <div class="label">e</div>
      <div class="label">f</div>
      <div class="label">g</div>
      <div class="label">h</div>

    </div>

    <!-- Controls -->
    <div class="controls">
      <button id="restartBtn">Restart Game</button>
    </div>

  </div>

  <!-- jQuery -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <!-- Script -->
  <script src="script.js"></script>

</body>
</html>
